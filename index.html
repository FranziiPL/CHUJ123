<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badanie</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        body {font-family: 'Roboto', sans-serif; margin:0; padding:0; background:#f4f4f9; display:flex; align-items:center; justify-content:center; min-height:100vh; color:#333;}
        .container {max-width:600px; width:90%; background:white; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1); overflow:hidden;}
        .header {background:#3498db; color:white; padding:20px; text-align:center; font-size:1.4em;}
        .content {padding:40px 30px; text-align:center;}
        label {display:block; margin:20px 0 8px; font-weight:500; text-align:left;}
        select, input {width:100%; padding:12px; border:2px solid #ddd; border-radius:8px; font-size:1.1em; box-sizing: border-box;}
        .radio-group {display:flex; gap:15px; justify-content:flex-start; margin:15px 0; flex-wrap: wrap; text-align: left;}
        .radio-group label {display: flex; align-items: center; margin: 0; font-weight: 400; cursor: pointer; width: 100%;}
        .radio-group input {width: auto; margin-right: 10px;}
        button {margin-top:30px; padding:15px 40px; font-size:1.2em; background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer;}
        button:hover {background:#219653;}
        
        .loading {display:none; flex-direction:column; align-items:center; padding:60px 20px;}
        .spinner {border:8px solid #f3f3f3; border-top:8px solid #3498db; border-radius:50%; width:70px; height:70px; animation:spin 1s linear infinite; margin-bottom:25px;}
        @keyframes spin {0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}
        
        .thank {display:none; padding:60px 40px; font-size:1.3em; line-height:1.5; text-align: center;}
    </style>
</head>
<body>
    <div class="container">
        <div id="form-container">
            <div class="header">Podstawowe dane</div>
            <div class="content">
                <label>Unikalny kod (2 litery imienia + rok urodzenia):</label>
                <input type="text" id="user_code" placeholder="np. MA1995" maxlength="10">

                <label>Wypełniam ankietę na:</label>
                <div class="radio-group">
                    <label><input type="radio" name="device" value="stacjonarny"> Komputerze stacjonarnym</label>
                    <label><input type="radio" name="device" value="laptop"> Laptopie</label>
                    <label><input type="radio" name="device" value="mobilne"> Urządzeniu mobilnym (telefon, tablet)</label>
                </div>

                <label>Płeć:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="kobieta"> Kobieta</label>
                    <label><input type="radio" name="gender" value="mężczyzna"> Mężczyzna</label>
                </div>

                <label>Wiek (w latach):</label>
                <input type="number" id="age" min="1" max="120" placeholder="Wpisz wiek">

                <label>Wykształcenie:</label>
                <select id="education">
                    <option value="">— wybierz —</option>
                    <option value="podstawowe">podstawowe</option>
                    <option value="średnie">średnie</option>
                    <option value="techniczne">techniczne</option>
                    <option value="zawodowe">zawodowe</option>
                    <option value="wyższe">wyższe</option>
                </select>

                <button onclick="startLoading()">Przejdź dalej</button>
            </div>
        </div>

        <div id="loading-container" class="loading">
            <div class="spinner"></div>
            <h2>Trwa ładowanie. Proszę czekać…</h2>
        </div>

        <div id="thank-container" class="thank">
            Dziękujemy za udział w badaniu.<br><br>
            Celem niniejszego testu było sprawdzenie cierpliwości użytkownika nim zdecyduje się opuścić stronę.<br><br>
            Państwa wynik został odnotowany.
        </div>
    </div>

    <script>
        // TUTAJ WKLEJ SWÓJ URL
        const APP_URL = 'https://script.google.com/macros/s/AKfycbxFJ4Cp22Cq6G1E65jUTLV1ecTk2JaDhCLoedPvKe47mQSQi7QQzwoi3oyq5jk7v6yeDw/exec';

        let startTime = null;
        let payload = null;
        let dataSent = false;

        function show(id) {
            document.querySelectorAll('.container > div').forEach(div => div.style.display = 'none');
            const target = document.getElementById(id);
            if (id === 'loading-container') {
                target.style.display = 'flex';
            } else {
                target.style.display = 'block';
            }
        }

        function startLoading() {
            const userCode = document.getElementById('user_code').value.trim();
            const device = document.querySelector('input[name="device"]:checked');
            const gender = document.querySelector('input[name="gender"]:checked');
            const age = document.getElementById('age').value;
            const education = document.getElementById('education').value;

            if (!userCode) { alert('Wpisz swój kod'); return; }
            if (!device) { alert('Wybierz urządzenie'); return; }
            if (!gender) { alert('Wybierz płeć'); return; }
            if (!age || age < 1) { alert('Podaj poprawny wiek'); return; }
            if (!education) { alert('Wybierz wykształcenie'); return; }

            startTime = Date.now();
            payload = {
                user_code: userCode,
                device: device.value,
                gender: gender.value,
                age: parseInt(age),
                education: education,
                time_seconds: 0,
                timestamp: new Date().toLocaleString("pl-PL") // Ładniejszy format daty
            };

            show('loading-container');
        }

        function sendFinalData() {
            if (!payload || !startTime || dataSent) return;

            const finalTime = Math.floor((Date.now() - startTime) / 1000);
            payload.time_seconds = finalTime;

            const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain;charset=utf-8' });
            const success = navigator.sendBeacon(APP_URL, blob);

            if (success) {
                dataSent = true;
                localStorage.setItem('surveyCompleted', 'true');
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                sendFinalData();
            }
        });

        window.addEventListener('pagehide', sendFinalData);

        window.onload = function() {
            if (localStorage.getItem('surveyCompleted') === 'true') {
                show('thank-container');
                return;
            }
            show('form-container');
        };
    </script>
</body>
</html>
